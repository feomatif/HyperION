name: Feature request
description: Suggest an improvement to the HyperION production workflow
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Tell us about the production problem you want to solve. Clear workflows are more useful than feature names alone.
  - type: textarea
    id: problem
    attributes:
      label: Production problem
      description: What is difficult, slow, or currently impossible in your workflow?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Suggested workflow
      description: Describe how you would expect the feature to work inside HyperION.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any workarounds or other approaches you have tried.
  - type: dropdown
    id: area
    attributes:
      label: Main area
      options:
        - Arrangement and editing
        - Recording
        - MIDI and piano roll
        - Step sequencer
        - Mixer and routing
        - Plugins and instruments
        - AI-assisted tools
        - Export and mastering
        - Browser and library
        - User interface
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked existing issues for similar requests.
          required: true
